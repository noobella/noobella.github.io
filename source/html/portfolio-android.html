    <script>

        function textAppear(word, id){
            var repeat = '';
            var counter = 0;
            var interval = setInterval(frame, 150);
            function frame() {
                if(counter < word.length){
                    repeat += word[counter]
                    document.getElementById(id).innerHTML = repeat + '|';
                    counter++;
                }else{
                    document.getElementById(id).innerHTML = word;
                    clearInterval(interval);
                }
            } 
        }

        function blinker(word, id){
            var interval = setInterval(frame, 600);
            function frame(){
            if(document.getElementById(id).innerHTML === word){
                document.getElementById(id).innerHTML = word + '|';
            }else{
                document.getElementById(id).innerHTML = word;   
                }
            }
        }

        function setAndroidTitle(){
            textAppear('ANDROID APPS.', 'welcome-title');
            setTimeout(function() {blinker('ANDROID APPS.', 'welcome-title');}, 1250);
        }
        
        setAndroidTitle();
        
    </script>
